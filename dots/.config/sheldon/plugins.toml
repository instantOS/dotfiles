shell = "zsh"

# 1. Add completion directories to fpath first (Pin: 03bae0b)
[plugins.zsh-completions]
github = "zsh-users/zsh-completions"
rev = "03bae0bf3f9c4ab894f1f11a31ffe7a1e1029879"
dir = "src"
apply = ["fpath"]

# 2. Run compinit immediately after fpath is configured to define `compdef`
[plugins.compinit]
inline = """
autoload -Uz compinit
if [[ -n "${ZDOTDIR:-$HOME}/.zcompdump(#qN.m+1)" ]]; then
  compinit
else
  compinit -C
fi
"""

# 3. Configure standard completion styling and behaviors
[plugins.completion-styles]
inline = """
zstyle ':completion:*' menu select
zstyle ':completion:*' matcher-list 'm:{a-zA-Z}={A-Za-z}' 'r:|=*' 'l:|=*'
zstyle ':completion:*' use-cache on
zstyle ':completion:*' cache-path "${XDG_CACHE_HOME:-$HOME/.cache}/zsh/zcompcache"
"""

# 4. Load Oh My Zsh library defaults (Pin: 677a459)
[plugins.omz-directories]
github = "ohmyzsh/ohmyzsh"
rev = "677a4592b18c08ddea737f8aca70bac0e9fc9313"
dir = "lib"
use = ["directories.zsh"]

[plugins.omz-history]
github = "ohmyzsh/ohmyzsh"
rev = "677a4592b18c08ddea737f8aca70bac0e9fc9313"
dir = "lib"
use = ["history.zsh"]

[plugins.omz-key-bindings]
github = "ohmyzsh/ohmyzsh"
rev = "677a4592b18c08ddea737f8aca70bac0e9fc9313"
dir = "lib"
use = ["key-bindings.zsh"]

[plugins.omz-theme-and-appearance]
github = "ohmyzsh/ohmyzsh"
rev = "677a4592b18c08ddea737f8aca70bac0e9fc9313"
dir = "lib"
use = ["theme-and-appearance.zsh"]

# 5. Load external tools and integrations
[plugins.zoxide]
inline = 'eval "$(zoxide init zsh)"'

# (Pin: 677a459)
[plugins.ohmyzsh-fzf]
github = "ohmyzsh/ohmyzsh"
rev = "677a4592b18c08ddea737f8aca70bac0e9fc9313"
dir = "plugins/fzf"

# (Pin: 85919cd)
[plugins.zsh-autosuggestions]
github = "zsh-users/zsh-autosuggestions"
rev = "85919cd1ffa7d2d5412f6d3fe437ebdbeeec4fc5"

